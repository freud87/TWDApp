<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#15140f">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="icon" href="./icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root{
      --bg:#15140f;
      --panel:rgba(28, 27, 21, 0.4); 
      --panel-2:rgba(34, 33, 26, 0.65);
      --line:rgba(52, 50, 42, 0.5); 
      --bone:#eae6da;
      --muted:#93907f;
      --rust:#b23a2c;
      --rust-dim:#6e2a22;
      --amber:#c9a227;
      --amber-dim:#7a6318;
      --moss:#5f7a4c;
      --moss-dim:#3d4f32;
      --slate:#5c6b73;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;height:100%;overflow:hidden;} 
    
    body{
      background-color: var(--bg);
      background-image: 
        linear-gradient(180deg, rgba(21, 20, 15, 0.7) 0%, rgba(21, 20, 15, 0.85) 100%),
        url('https://c4.wallpaperflare.com/wallpaper/694/760/18/tv-show-the-walking-dead-rick-grimes-wallpaper-preview.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      color:var(--bone);
      font-family:'Inter',system-ui,sans-serif;
      -webkit-font-smoothing:antialiased;
      display: flex;
      flex-direction: column;
    }

    .top{
      flex-shrink: 0; 
      background:linear-gradient(180deg, rgba(21,20,15,.96), rgba(21,20,15,.88));
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      border-bottom:1px solid var(--line);
      padding:18px 20px 14px;
    }
    .brand{
      display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;
    }
    .brand h1{
      font-family:'Oswald',sans-serif;
      font-weight:700;
      font-size:22px;
      letter-spacing:.06em;
      text-transform:uppercase;
      margin:0;
      color:var(--bone);
    }
    .brand h1 span{color:var(--rust);}
    .brand small{
      font-family:'JetBrains Mono',monospace;
      color:var(--muted);
      font-size:12px;
      letter-spacing:.03em;
    }
    .meter-row{
      display:flex; align-items:center; gap:12px; margin-top:12px;
    }
    .meter{
      flex:1; height:10px; border-radius:2px;
      background:repeating-linear-gradient(45deg, rgba(38,36,27,0.4) 0 6px, rgba(33,31,23,0.4) 6px 12px);
      border:1px solid var(--line);
      overflow:hidden;
      position:relative;
    }
    .meter-fill{
      height:100%;
      background:linear-gradient(90deg, var(--moss-dim), var(--moss));
      width:0%;
      transition:width .4s ease;
    }
    .meter-label{
      font-family:'JetBrains Mono',monospace;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
    }
    .controls{
      display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; align-items:center;
    }
    .chipset{display:flex; gap:6px; flex-wrap:wrap;}

    .filter-chip{
      font-family:'JetBrains Mono',monospace;
      font-size:11px;
      letter-spacing:.02em;
      padding:6px 10px;
      border-radius:3px;
      border:1px solid var(--line);
      background:rgba(21, 20, 15, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      color:var(--muted);
      cursor:pointer;
      user-select:none;
      transition:.15s;
    }
    .filter-chip:hover{background:rgba(255,255,255,0.05);}

    /* Boutons filtres d'univers */
    .filter-chip[data-univers="The Walking Dead"] { border-color: var(--rust); color: var(--rust); }
    .filter-chip[data-univers="The Walking Dead"]:hover { background: rgba(178,58,44,.2); }
    .filter-chip[data-univers="The Walking Dead"].active { background: var(--rust-dim); color: var(--bone); }

    .filter-chip[data-univers="Fear the Walking Dead"] { border-color: var(--amber); color: var(--amber); }
    .filter-chip[data-univers="Fear the Walking Dead"]:hover { background: rgba(201,162,39,.2); }
    .filter-chip[data-univers="Fear the Walking Dead"].active { background: var(--amber-dim); color: var(--bone); }

    .filter-chip[data-univers="The Walking Dead: World Beyond"] { border-color: var(--moss); color: var(--moss); }
    .filter-chip[data-univers="The Walking Dead: World Beyond"]:hover { background: rgba(95,122,76,.2); }
    .filter-chip[data-univers="The Walking Dead: World Beyond"].active { background: var(--moss-dim); color: var(--bone); }

    .filter-chip[data-univers="Tales of the Walking Dead"] { border-color: var(--slate); color: var(--slate); }
    .filter-chip[data-univers="Tales of the Walking Dead"]:hover { background: rgba(92,107,115,.2); }
    .filter-chip[data-univers="Tales of the Walking Dead"].active { background: var(--slate); color: var(--bone); }

    .filter-chip[data-univers="The Walking Dead: The Ones Who Live"] { border-color: var(--rust); color: var(--rust); }
    .filter-chip[data-univers="The Walking Dead: The Ones Who Live"]:hover { background: rgba(178,58,44,.2); }
    .filter-chip[data-univers="The Walking Dead: The Ones Who Live"].active { background: var(--rust-dim); color: var(--bone); }

    .filter-chip[data-univers="The Walking Dead: Daryl Dixon"] { border-color: var(--amber); color: var(--amber); }
    .filter-chip[data-univers="The Walking Dead: Daryl Dixon"]:hover { background: rgba(201,162,39,.2); }
    .filter-chip[data-univers="The Walking Dead: Daryl Dixon"].active { background: var(--amber-dim); color: var(--bone); }

    .filter-chip[data-univers="The Walking Dead: Dead City"] { border-color: var(--moss); color: var(--moss); }
    .filter-chip[data-univers="The Walking Dead: Dead City"]:hover { background: rgba(95,122,76,.2); }
    .filter-chip[data-univers="The Walking Dead: Dead City"].active { background: var(--moss-dim); color: var(--bone); }

    .filter-chip[data-univers="tous"] { border-color: var(--line); color: var(--muted); }
    .filter-chip[data-univers="tous"].active { border-color: var(--bone); color: var(--bone); background: var(--panel-2); }

    .filter-chip[data-status] { border-color: var(--line); }
    .filter-chip[data-status]:hover{ border-color: var(--rust); }
    .filter-chip[data-status].active{ background: var(--rust-dim); border-color: var(--rust); color: var(--bone); }

    .search{
      margin-left:auto;
      background:rgba(21, 20, 15, 0.7);
      border:1px solid var(--line);
      border-radius:3px;
      padding:6px 10px;
      color:var(--bone);
      font-family:'JetBrains Mono',monospace;
      font-size:12px;
      min-width:160px;
      backdrop-filter: blur(4px);
    }
    .search::placeholder{color:var(--muted);}

    main{
      flex: 1;
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      padding: 14px 20px 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden; 
    }

    .bulk-btn{
      font-family:'JetBrains Mono',monospace;
      font-size:11px;
      font-weight:600;
      color:#15140f;
      background:var(--bone);
      border:1px solid var(--bone);
      border-radius:3px;
      padding:6px 10px;
      cursor:pointer;
      transition:.15s;
    }
    .bulk-btn:hover{
      background:#d5d1c5;
      border-color:#d5d1c5;
    }

    /* Conteneur de liste avec barre de défilement masquée */
    .list{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:4px;
      overflow-y:auto; 
      flex: 1;

      /* Masque la barre sur Firefox */
      scrollbar-width: none; 
      /* Masque la barre sur Internet Explorer et Edge legacy */
      -ms-overflow-style: none; 
    }

    /* Masque la barre sur Chrome, Safari, Opera et le nouvel Edge */
    .list::-webkit-scrollbar {
      display: none;
    }

    .row{
      display:grid;
      grid-template-columns: 90px 1fr auto auto;
      align-items:center; gap:10px;
      padding:10px 14px;
      border-bottom:1px solid var(--line);
      transition:background .12s;
    }
    .row:last-child{border-bottom:none;}
    .row:hover{background:var(--panel-2);}
    .row.hidden{display:none;}

    .row-serie{
      font-family:'Oswald',sans-serif;
      font-size:11px;
      font-weight:600;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:var(--slate);
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .row-code-wrapper{
      display:flex;
      align-items:center;
      gap:8px;
      overflow:hidden;
    }
    .row-fullname{
      font-family:'Inter',sans-serif;
      font-size:13px;
      color:var(--bone);
      font-weight:600;
    }
    .row-code{
      font-family:'JetBrains Mono',monospace;
      font-size:13px;
      letter-spacing:.02em;
      color:var(--bone);
      font-weight:600;
      white-space:nowrap;
    }
    .row-mobile-wrapper {
      display: none;
    }
    
    .row.vu .row-code, .row.vu .row-fullname, .row.vu .row-mobile-wrapper .row-code {
      color:var(--muted) !important; text-decoration:line-through; text-decoration-color:var(--moss);
    }
    .row.vu .row-serie{color:var(--muted) !important;}

    .row-btn{
      font-family:'JetBrains Mono',monospace;
      font-size:13px;
      padding:6px 9px;
      border-radius:3px;
      border:1px solid var(--line);
      background:rgba(34, 33, 26, 0.4);
      color:var(--muted);
      cursor:pointer;
      white-space:nowrap;
      transition:.15s;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:34px;
      line-height:1;
      width:46px;
    }
    .row-btn i{font-size:14px;}
    .row-search-btn:hover{border-color:var(--amber); color:var(--bone);}
    .row-vu-btn:hover{border-color:var(--rust); color:var(--bone);}
    .row-vu-btn.vu{
      background:var(--moss-dim);
      border-color:var(--moss);
      color:#dfe8d6;
    }
    .row.current{
      box-shadow:0 0 0 2px var(--rust) inset, 0 0 14px rgba(178,58,44,.55);
      animation:pulse 1.8s ease-out 2;
    }
    @keyframes pulse{
      0%{box-shadow:0 0 0 2px var(--rust) inset, 0 0 20px rgba(178,58,44,.8);}
      100%{box-shadow:0 0 0 2px var(--rust) inset, 0 0 6px rgba(178,58,44,.3);}
    }

    .empty{
      text-align:center; color:var(--muted);
      font-family:'JetBrains Mono',monospace;
      padding:60px 0; font-size:13px;
    }
    .toast{
      position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(20px);
      background:var(--rust-dim); border:1px solid var(--rust); color:var(--bone);
      font-family:'JetBrains Mono',monospace; font-size:12px;
      padding:8px 14px; border-radius:4px; opacity:0; transition:.25s;
      pointer-events:none;
    }
    .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

    /* Responsive Mobile */
    @media (max-width:768px){
      .row{grid-template-columns: 55px 1fr auto auto; padding:9px 10px; gap:6px;}
      .row-btn{padding:5px 7px; font-size:12px; min-width:30px; width:40px;}
      .row-code-wrapper{display:none;}
      .row-mobile-wrapper{
        display:flex;
        align-items:center;
        font-family:'JetBrains Mono',monospace;
        font-size:12px;
        font-weight:600;
        color:var(--bone);
      }
      .search{margin-left: 0; width: 100%;}
    }

    /* Desktop */
    @media (min-width:769px){
      .row-serie{width:80px; flex-shrink:0;}
    }
  </style>
</head>
<body>

  <div class="top">
    <div class="brand">
      <h1>Journal de <span>survie</span></h1>
      <small id="subtitle">TWD UNIVERSE — SUIVI CHRONOLOGIQUE</small>
    </div>
    <div class="meter-row">
      <div class="meter"><div class="meter-fill" id="meterFill"></div></div>
      <div class="meter-label" id="meterLabel">0 / 0 · 0%</div>
    </div>
    <div class="controls">
      <div class="chipset" id="universeFilters"></div>
      <div class="chipset">
        <div class="filter-chip active" data-status="tous"><i class="bi bi-collection"></i> TOUS</div>
        <div class="filter-chip" data-status="voir"><i class="bi bi-eye"></i> À VOIR</div>
        <div class="filter-chip" data-status="vus"><i class="bi bi-check2-all"></i> VUS</div>
      </div>
      <button class="bulk-btn" id="continueBtn"><i class="bi bi-play-fill"></i> Prochain</button>
      <input class="search" id="search" placeholder="Chercher... S04, E07" />
    </div>
  </div>

  <main id="app">
    <div class="empty">Chargement du journal...</div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyj83OXLlan3tr04LNbl16BAyztHsiDlu9FufaFxlYWk8RNyFe7BqgrDPNayC9c-In4Gw/exec';
    var usingGAS = !!(typeof google !== 'undefined' && google.script && google.script.run);

    function jsonp(url, cb){
      var cbName = 'jsonp_cb_' + Math.random().toString(36).slice(2);
      var s = document.createElement('script');
      window[cbName] = function(data){
        cb(data);
        delete window[cbName];
        s.remove();
      };
      s.src = url + (url.indexOf('?') > -1 ? '&' : '?') + 'callback=' + cbName;
      s.onerror = function(){ cb({ ok: false, error: 'Connexion impossible' }); delete window[cbName]; };
      document.body.appendChild(s);
    }

    function remoteGetEpisodes(cb){
      if (usingGAS){
        google.script.run.withSuccessHandler(cb).withFailureHandler(function(){ cb([]); }).getEpisodes();
      } else {
        jsonp(APPS_SCRIPT_URL + '?action=episodes', function(res){
          cb(res && res.ok ? res.data : []);
        });
      }
    }

    function remoteSetVu(ordre, vu, cb){
      if (usingGAS){
        google.script.run.withSuccessHandler(cb).withFailureHandler(function(){ cb({ ok:false, error:'Connexion impossible' }); }).setVu(ordre, vu);
      } else {
        jsonp(APPS_SCRIPT_URL + '?action=setVu&ordre=' + ordre + '&vu=' + vu, cb);
      }
    }

    if ('serviceWorker' in navigator && !usingGAS) {
      window.addEventListener('load', function(){
        navigator.serviceWorker.register('/TWDApp/sw.js').catch(function(){});
      });
    }

    var EPISODES = [];
    var statusFilter = 'tous';
    var universeFilter = 'tous';
    var searchTerm = '';

    var UNIVERSE_COLOR = {
      'The Walking Dead': 'var(--rust)',
      'Fear the Walking Dead': 'var(--amber)',
      'The Walking Dead: World Beyond': 'var(--moss)',
      'Tales of the Walking Dead': 'var(--slate)',
      'The Walking Dead: The Ones Who Live': 'var(--rust)',
      'The Walking Dead: Daryl Dixon': 'var(--amber)',
      'The Walking Dead: Dead City': 'var(--moss)'
    };

    var UNIVERSE_SHORT = {
      'The Walking Dead': 'TWD',
      'Fear the Walking Dead': 'FTWD',
      'The Walking Dead: World Beyond': 'WORLD BEYOND',
      'Tales of the Walking Dead': 'TALES',
      'The Walking Dead: The Ones Who Live': 'ONES WHO LIVE',
      'The Walking Dead: Daryl Dixon': 'DARYL DIXON',
      'The Walking Dead: Dead City': 'DEAD CITY'
    };

    function showToast(msg){
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function(){ t.classList.remove('show'); }, 1800);
    }

    function updateMeter(){
      var total = EPISODES.length;
      var vus = EPISODES.filter(function(e){ return e.vu; }).length;
      var pct = total ? Math.round((vus / total) * 100) : 0;
      document.getElementById('meterFill').style.width = pct + '%';
      document.getElementById('meterLabel').textContent = vus + ' / ' + total + ' · ' + pct + '%';
    }

    function buildUniverseFilters(){
      var el = document.getElementById('universeFilters');
      var universes = ['tous'].concat(Object.keys(UNIVERSE_SHORT).filter(function(u){
        return EPISODES.some(function(e){ return e.univers === u; });
      }));
      el.innerHTML = universes.map(function(u){
        var label = u === 'tous' ? '<i class="bi bi-grid-3x3-gap"></i> TOUS' : UNIVERSE_SHORT[u];
        var activeClass = (u === 'tous' && universeFilter === 'tous') ? ' active' : '';
        var activeClass2 = (u === universeFilter && u !== 'tous') ? ' active' : '';
        return '<div class="filter-chip' + activeClass + activeClass2 + '" data-univers="' + u + '">' + label + '</div>';
      }).join('');
      el.querySelectorAll('.filter-chip').forEach(function(chip){
        chip.addEventListener('click', function(){
          el.querySelectorAll('.filter-chip').forEach(function(c){ c.classList.remove('active'); });
          chip.classList.add('active');
          universeFilter = chip.getAttribute('data-univers');
          render();
        });
      });
    }

    function matchesFilters(ep){
      if (universeFilter !== 'tous' && ep.univers !== universeFilter) return false;
      if (statusFilter === 'voir' && ep.vu) return false;
      if (statusFilter === 'vus' && !ep.vu) return false;
      if (searchTerm){
        var hay = (ep.code + ' ' + ep.univers + ' S' + ep.saison + ' E' + ep.episode).toLowerCase();
        if (hay.indexOf(searchTerm.toLowerCase()) === -1) return false;
      }
      return true;
    }

    function searchUrlFor(ep){
      var q = (ep.univers || '') + ' S' + String(ep.saison).padStart(2, '0') +
              'E' + String(ep.episode).padStart(2, '0') + ' Egydead';
      return 'https://www.google.com/search?q=' + encodeURIComponent(q);
    }

    function render(){
      var app = document.getElementById('app');
      var visible = EPISODES.filter(matchesFilters);

      if (visible.length === 0){
        app.innerHTML = '<div class="empty">Aucun épisode ne correspond à ce filtre.</div>';
        updateMeter();
        return;
      }

      var html = '<div class="list">';
      visible.forEach(function(ep){
        var color = UNIVERSE_COLOR[ep.univers] || 'var(--slate)';
        var sigleText = ep.sigle || UNIVERSE_SHORT[ep.univers] || ep.univers;
        var isVu = !!ep.vu;

        var searchBtn = '<button class="row-btn row-search-btn' + (isVu ? ' hidden-search' : '') + '" data-search-ordre="' + ep.ordre + '" title="Rechercher">' +
                          '<i class="bi bi-search"></i>' +
                        '</button>';

        var vuBtn = '<button class="row-btn row-vu-btn' + (isVu ? ' vu' : '') + '" data-vu-ordre="' + ep.ordre + '" title="Marquer vu/non vu">' +
                      (isVu ? '<i class="bi bi-check-lg"></i>' : '<i class="bi bi-eye"></i>') +
                    '</button>';

        var pcDisplay = '<div class="row-code-wrapper">' +
                          '<span class="row-fullname">' + ep.univers + ' ' + ep.code + '</span>' +
                        '</div>';

        var mobileDisplay = '<div class="row-mobile-wrapper">' +
                              '<span class="row-code">' + sigleText + ' ' + ep.code + '</span>' +
                            '</div>';

        html += '<div class="row' + (isVu ? ' vu' : '') + '" data-ordre="' + ep.ordre + '">' +
                  '<div class="row-serie" style="color:' + color + '">' + sigleText + '</div>' +
                  pcDisplay +
                  mobileDisplay +
                  searchBtn +
                  vuBtn +
                '</div>';
      });
      html += '</div>';
      app.innerHTML = html;

      var style = document.createElement('style');
      style.id = 'search-btn-hidden-style';
      if (!document.getElementById('search-btn-hidden-style')) {
        style.textContent = `
          .row-btn.hidden-search {
            visibility: hidden;
            pointer-events: none;
          }
        `;
        document.head.appendChild(style);
      }

      app.querySelectorAll('[data-search-ordre]').forEach(function(btn){
        btn.addEventListener('click', function(e){
          e.stopPropagation();
          var ep = EPISODES.find(function(e2){ return e2.ordre === Number(btn.getAttribute('data-search-ordre')); });
          if (ep) window.open(searchUrlFor(ep), '_blank');
        });
      });

      app.querySelectorAll('[data-vu-ordre]').forEach(function(btn){
        btn.addEventListener('click', function(e){
          e.stopPropagation();
          toggleEpisode(Number(btn.getAttribute('data-vu-ordre')));
        });
      });

      updateMeter();
    }

    function toggleEpisode(ordre){
      var ep = EPISODES.find(function(e){ return e.ordre === ordre; });
      if (!ep) return;
      var next = !ep.vu;
      ep.vu = next;
      render();
      remoteSetVu(ordre, next, function(res){
        if (!res || !res.ok){ ep.vu = !next; render(); showToast('Erreur : ' + (res && res.error || 'inconnue')); }
      });
    }

    document.querySelectorAll('[data-status]').forEach(function(chip){
      chip.addEventListener('click', function(){
        document.querySelectorAll('[data-status]').forEach(function(c){ c.classList.remove('active'); });
        chip.classList.add('active');
        statusFilter = chip.getAttribute('data-status');
        render();
      });
    });

    document.getElementById('search').addEventListener('input', function(e){
      searchTerm = e.target.value;
      render();
    });

    function findCurrentOrdre(){
      if (!EPISODES.length) return null;
      var lastWatched = 0;
      EPISODES.forEach(function(e){ if (e.vu && e.ordre > lastWatched) lastWatched = e.ordre; });
      if (lastWatched === 0) return EPISODES[0].ordre;
      var next = EPISODES.find(function(e){ return e.ordre === lastWatched + 1; });
      return next ? next.ordre : lastWatched;
    }

    function scrollToCurrent(){
      var ordre = findCurrentOrdre();
      if (ordre == null) return;
      
      var container = document.querySelector('.list');
      var row = container ? container.querySelector('.row[data-ordre="' + ordre + '"]') : null;
      
      if (!row){
        statusFilter = 'tous'; universeFilter = 'tous'; searchTerm = '';
        document.getElementById('search').value = '';
        document.querySelectorAll('.filter-chip').forEach(function(c){ c.classList.remove('active'); });
        document.querySelector('.filter-chip[data-status="tous"]').classList.add('active');
        var tousUnivers = document.querySelector('.filter-chip[data-univers="tous"]');
        if (tousUnivers) tousUnivers.classList.add('active');
        render();
        container = document.querySelector('.list');
        row = container ? container.querySelector('.row[data-ordre="' + ordre + '"]') : null;
      }
      if (!row || !container) return;
      
      var rowOffsetTop = row.offsetTop;
      var containerHeight = container.clientHeight;
      var rowHeight = row.clientHeight;
      container.scrollTop = rowOffsetTop - (containerHeight / 2) + (rowHeight / 2);
      
      row.classList.add('current');
      setTimeout(function(){ row.classList.remove('current'); }, 3600);
    }

    document.getElementById('continueBtn').addEventListener('click', scrollToCurrent);

    remoteGetEpisodes(function(data){
      EPISODES = data || [];
      buildUniverseFilters();
      render();
      setTimeout(scrollToCurrent, 350);
    });
  </script>
</body>
</html>
