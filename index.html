<!DOCTYPE html>
<html>
<head>
  <title>TWD App</title>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
 <!-- ===== PWA META TAGS ESSENTIELS ===== -->
  <link rel="manifest" href="/TWDApp/manifest.json">
  <meta name="theme-color" content="#15140f">
  
  <!-- iOS Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TWD App">
  <link rel="apple-touch-icon" href="/TWDApp/icon-192.png">
  
  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="/TWDApp/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/TWDApp/icon-512.png">
  <link rel="mask-icon" href="/TWDApp/icon-maskable-512.png" color="#15140f">
  
  <!-- ===== FIN PWA ===== -->
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root{
      --bg:#15140f;
      --panel:rgba(28, 27, 21, 0.4);
      --panel-2:rgba(34, 33, 26, 0.65);
      --line:rgba(52, 50, 42, 0.5);
      --bone:#eae6da;
      --muted:#93907f;
      --rust:#b23a2c;
      --rust-dim:#6e2a22;
      --amber:#c9a227;
      --amber-dim:#7a6318;
      --moss:#5f7a4c;
      --moss-dim:#3d4f32;
      --slate:#5c6b73;
      --sync-ok:#5f7a4c;
      --sync-error:#b23a2c;
      --sync-syncing:#c9a227;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;height:100%;overflow:hidden;}

    body{
      background-color: var(--bg);
      background-image:
        linear-gradient(180deg, rgba(21, 20, 15, 0.7) 0%, rgba(21, 20, 15, 0.85) 100%),
        url('https://c4.wallpaperflare.com/wallpaper/694/760/18/tv-show-the-walking-dead-rick-grimes-wallpaper-preview.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      color:var(--bone);
      font-family:'Inter',system-ui,sans-serif;
      -webkit-font-smoothing:antialiased;
      display: flex;
      flex-direction: column;
    }

    .top{
      flex-shrink: 0;
      background:linear-gradient(180deg, rgba(21,20,15,.96), rgba(21,20,15,.88));
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      border-bottom:1px solid var(--line);
      padding:14px 20px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .top-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .brand-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand h1{
      font-weight:700;
      font-size:20px;
      letter-spacing:.06em;
      text-transform:uppercase;
      margin:0;
      color:var(--bone);
    }
    .brand h1 span{color:var(--rust);}
    .brand small{
      color:var(--muted);
      font-size:11px;
      letter-spacing:.05em;
      font-weight: 500;
      display: block;
    }

    /* Indicateur de synchro plus petit */
    .sync-dot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--sync-ok);
      transition: background 0.3s ease, transform 0.3s ease;
      flex-shrink: 0;
      position: relative;
    }
    .sync-dot.syncing {
      background: var(--sync-syncing);
      animation: pulse-dot 0.8s ease-in-out infinite;
    }
    .sync-dot.error {
      background: var(--sync-error);
    }
    .sync-dot.ok {
      background: var(--sync-ok);
    }
    @keyframes pulse-dot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.6; }
    }

    .meter-container {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
    }
    .meter{
      flex:1; height:8px; border-radius:2px;
      background:repeating-linear-gradient(45deg, rgba(38,36,27,0.4) 0 6px, rgba(33,31,23,0.4) 6px 12px);
      border:1px solid var(--line);
      overflow:hidden;
      position:relative;
    }
    .meter-fill{
      height:100%;
      background:linear-gradient(90deg, var(--moss-dim), var(--moss));
      width:0%;
      transition:width .4s ease;
    }
    .meter-label{
      font-size:11px;
      color:var(--muted);
      white-space:nowrap;
      font-weight: 500;
    }

    main{
      flex: 1;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      gap: 20px;
      overflow: hidden;
    }

    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: rgba(21, 20, 15, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(178, 58, 44, 0.35) transparent;
    }
    .sidebar::-webkit-scrollbar {
      width: 6px;
    }
    .sidebar::-webkit-scrollbar-track {
      background: transparent;
      margin: 6px 0;
    }
    .sidebar::-webkit-scrollbar-thumb {
      background: rgba(178, 58, 44, 0.25);
      border-radius: 10px;
      transition: background .2s ease;
    }
    .sidebar::-webkit-scrollbar-thumb:hover {
      background: rgba(178, 58, 44, 0.9);
    }
    .sidebar::-webkit-scrollbar-button {
      display: none;
      width: 0;
      height: 0;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-group-title {
      font-size: 12px;
      letter-spacing: .08em;
      color: var(--muted);
      text-transform: uppercase;
      border-bottom: 1px solid var(--line);
      padding-bottom: 4px;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .chipset-vertical {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 5px;
    }
    .chipset-vertical .filter-chip {
      flex: 1;
      justify-content: center;
    }

    .chipset-stacked {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 5px;
    }
    .chipset-stacked .filter-chip {
      flex: 1 1 auto;
      justify-content: center;
      width: auto;
    }

    .filter-chip {
      font-size: 11px;
      padding: 8px 10px;
      border-radius: 3px;
      border: 1px solid var(--line);
      background: rgba(34, 33, 26, 0.3);
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: .15s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
      width: auto;
      align-self: flex-start;
    }
    .filter-chip:hover { background: rgba(255,255,255,0.05); color: var(--bone); }
    .filter-chip.active {
      background: var(--panel-2);
      border-color: var(--bone);
      color: var(--bone);
    }

    .filter-chip[data-univers].active { border-color: currentColor; background: rgba(255,255,255,0.08); }

    .reset-all-chip {
      justify-content: center;
      border-style: dashed;
      border-color: var(--rust);
      color: var(--bone);
      background: rgba(178, 58, 44, 0.15);
      font-weight: 600;
      width: 100%;
      align-self: stretch;
      order: -1;
    }
    .reset-all-chip:hover { background: rgba(178, 58, 44, 0.3); color: var(--bone); }

    .bulk-btn{
      font-size:12px;
      font-weight:600;
      color:#15140f;
      background:var(--bone);
      border:1px solid var(--bone);
      border-radius:3px;
      padding:8px 14px;
      cursor:pointer;
      transition:.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .bulk-btn:hover{ background:#d5d1c5; border-color:#d5d1c5; }

    #firstUnseenBtn {
      background: var(--rust);
      border-color: var(--rust);
      color: #fff;
    }
    #firstUnseenBtn:hover {
      background: #9e3226;
      border-color: #9e3226;
    }

    #toggleFilterBtn {
      display: none;
      background: rgba(34, 33, 26, 0.6);
      border: 1px solid var(--line);
      color: var(--bone);
    }
    #toggleFilterBtn:hover { background: var(--panel-2); }

    #resetFiltersBtnMobile {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 6px;
      border: 1px dashed var(--rust);
      color: var(--bone);
      background: rgba(178, 58, 44, 0.15);
      font-weight: 600;
      border-radius: 3px;
      padding: 8px 14px;
      cursor: pointer;
      transition: .15s;
    }
    #resetFiltersBtnMobile:hover { background: rgba(178, 58, 44, 0.3); }
    @media (max-width:900px){
      #resetFiltersBtnMobile.show { display: inline-flex; }
    }

    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .list{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:4px;
      overflow-y:auto;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: rgba(201, 162, 39, 0.35) transparent;
    }
    .list::-webkit-scrollbar {
      width: 6px;
    }
    .list::-webkit-scrollbar-track {
      background: transparent;
      margin: 4px 0;
    }
    .list::-webkit-scrollbar-thumb {
      background: rgba(201, 162, 39, 0.2);
      border-radius: 10px;
      transition: background .2s ease;
    }
    .list::-webkit-scrollbar-thumb:hover {
      background: rgba(201, 162, 39, 0.85);
    }
    .list::-webkit-scrollbar-button {
      display: none;
      width: 0;
      height: 0;
    }

    .row{
      display:grid;
      grid-template-columns: 80px 1fr auto auto;
      align-items:center; gap:12px;
      padding:11px 14px;
      border-bottom:1px solid var(--line);
      transition:background .12s;
    }
    .row:last-child{border-bottom:none;}
    .row:hover{background:var(--panel-2);}

    .row-serie{
      font-size:11px;
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:var(--slate);
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .row-code-wrapper{
      display:flex; align-items:center; gap:8px; overflow:hidden;
    }
    .row-fullname{
      font-size:13px; color:var(--bone); font-weight:600;
    }
    .row-code{
      font-size:13px; letter-spacing:.02em; color:var(--bone); font-weight:600; white-space:nowrap;
    }
    .row-mobile-wrapper { display: none; }

    .row.vu .row-code, .row.vu .row-fullname, .row.vu .row-mobile-wrapper .row-code {
      color:var(--muted) !important; text-decoration:line-through; text-decoration-color:var(--moss);
    }
    .row.vu .row-serie { color:var(--muted) !important; border-color: transparent; }

    .row-btn{
      font-size:13px; padding:6px 9px;
      border-radius:3px; border:1px solid var(--line); background:rgba(34, 33, 26, 0.4);
      color:var(--muted); cursor:pointer; white-space:nowrap; transition:.15s;
      display:inline-flex; align-items:center; justify-content:center; width:46px;
    }
    .row-search-btn:hover{border-color:var(--amber); color:var(--bone);}
    .row-vu-btn:hover{border-color:var(--rust); color:var(--bone);}
    .row-vu-btn.vu{ background:var(--moss-dim); border-color:var(--moss); color:#dfe8d6; }

    .row.current{
      box-shadow:0 0 0 2px var(--rust) inset, 0 0 14px rgba(178,58,44,.55);
      animation:pulse 1.8s ease-out 2;
    }
    @keyframes pulse{
      0%{box-shadow:0 0 0 2px var(--rust) inset, 0 0 20px rgba(178,58,44,.8);}
      100%{box-shadow:0 0 0 2px var(--rust) inset, 0 0 6px rgba(178,58,44,.3);}
    }

    .row.synced-update {
      animation: highlight 0.6s ease;
    }
    @keyframes highlight {
      0% { background: rgba(90, 170, 90, 0.3); }
      100% { background: transparent; }
    }

    .empty{
      text-align:center; color:var(--muted); padding:60px 0; font-size:13px; font-weight: 500;
    }
    .toast{
      position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(20px);
      background:var(--rust-dim); border:1px solid var(--rust); color:var(--bone);
      font-size:12px; padding:8px 14px; border-radius:4px; opacity:0; transition:.25s; pointer-events:none; z-index: 1000;
      font-weight: 500;
    }
    .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

    @media (max-width:900px){
      body {
        background-image:
          linear-gradient(180deg, rgba(21, 20, 15, 0.72) 0%, rgba(21, 20, 15, 0.88) 100%),
          url('https://w0.peakpx.com/wallpaper/289/542/HD-wallpaper-walking-dead-fav.jpg');
      }
      #toggleFilterBtn { display: inline-flex; }
      .top-header { flex-direction: row; justify-content: space-between; }
      main { flex-direction: column; padding: 10px; gap: 10px; position: relative; }

      .sidebar {
        display: none;
        width: 100%;
        max-height: 300px;
        gap: 12px;
        position: absolute;
        top: 10px; left: 0; right: 0;
        z-index: 99;
        background: rgba(21, 20, 15, 0.95);
        border-color: var(--bone);
      }
      .sidebar.open { display: flex; }

      .chipset-vertical { flex-direction: row; flex-wrap: wrap; }
      .row { grid-template-columns: 60px 1fr auto auto; padding:9px 10px; gap:6px; }
      .row-code-wrapper { display: none; }
      .row-mobile-wrapper {
        display: flex; flex-direction: column; font-size: 12px; font-weight: 600;
      }
      .row-btn { width: 40px; }

      .bulk-btn .btn-label {
        display: none;
      }
      .bulk-btn {
        padding: 8px 10px;
        font-size: 16px;
      }
      #firstUnseenBtn .btn-label {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="top">
    <div class="top-header">
      <div class="brand">
        <div class="brand-top">
          <h1>Journal de <span>survie</span></h1>
          <span class="sync-dot ok" id="syncDot" title="Synchronisation"></span>
        </div>
        <small id="subtitle">TWD UNIVERSE — SUIVI CHRONOLOGIQUE</small>
      </div>
      <div class="top-actions">
        <button class="bulk-btn" id="toggleFilterBtn" title="Filtrer"><i class="bi bi-sliders"></i></button>
        <button id="resetFiltersBtnMobile" title="Réinitialiser les filtres"><i class="bi bi-arrow-counterclockwise"></i> Tous</button>
        <button class="bulk-btn" id="continueBtn"><i class="bi bi-play-fill"></i> <span class="btn-label">Prochain</span></button>
        <button class="bulk-btn" id="firstUnseenBtn" style="display:none;"><i class="bi bi-chevron-double-up"></i> <span class="btn-label" id="firstUnseenLabel">Reprendre</span></button>
      </div>
    </div>
    <div class="meter-container">
      <div class="meter"><div class="meter-fill" id="meterFill"></div></div>
      <div class="meter-label" id="meterLabel">0 / 0 · 0%</div>
    </div>
  </div>

  <main>
    <div class="sidebar" id="sidebar">
      <div class="filter-chip reset-all-chip" id="resetFiltersBtn" style="display:none;">
        <i class="bi bi-arrow-counterclockwise"></i> Tous
      </div>
      <div class="filter-group">
        <div class="filter-group-title">Progression</div>
        <div class="chipset-vertical">
          <div class="filter-chip" data-status="voir"><i class="bi bi-eye"></i> À voir</div>
          <div class="filter-chip" data-status="vus"><i class="bi bi-check2-all"></i> Vus</div>
        </div>
      </div>
      <div class="filter-group">
        <div class="filter-group-title">Genre</div>
        <div class="chipset-vertical" id="genreFilters">
          <div class="filter-chip" data-genre="TVS"><i class="bi bi-tv"></i> TVS</div>
          <div class="filter-chip" data-genre="WBS"><i class="bi bi-globe"></i> WBS</div>
        </div>
      </div>
      <div class="filter-group">
        <div class="filter-group-title">Séries</div>
        <div class="chipset-stacked" id="universeFilters"></div>
      </div>
    </div>

    <div class="content-area" id="app">
      <div class="empty">Chargement du journal...</div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyj83OXLlan3tr04LNbl16BAyztHsiDlu9FufaFxlYWk8RNyFe7BqgrDPNayC9c-In4Gw/exec';
    var usingGAS = !!(typeof google !== 'undefined' && google.script && google.script.run);

    // ===== SYSTÈME DE SYNCHRONISATION SILENCIEUSE =====
    var SYNC_KEY = 'twd_sync_data';
    var LAST_UPDATE_KEY = 'twd_last_update';
    var SYNC_INTERVAL = 30000; // 30 secondes

    var syncDot = document.getElementById('syncDot');

    function setSyncStatus(status) {
      syncDot.className = 'sync-dot ' + status;
    }

    function getEpisodesHash() {
      if (!EPISODES.length) return '';
      return EPISODES.map(function(e) { return e.ordre + ':' + (e.vu ? '1' : '0'); }).join('|');
    }

    function saveLocalState() {
      try {
        var data = {
          hash: getEpisodesHash(),
          episodes: EPISODES.map(function(e) { return { ordre: e.ordre, vu: e.vu }; }),
          timestamp: Date.now()
        };
        localStorage.setItem(SYNC_KEY, JSON.stringify(data));
        localStorage.setItem(LAST_UPDATE_KEY, String(Date.now()));
      } catch(e) { /* ignore */ }
    }

    function checkLocalSync() {
      try {
        var stored = localStorage.getItem(SYNC_KEY);
        if (!stored) return false;
        var data = JSON.parse(stored);
        var currentHash = getEpisodesHash();
        if (data.hash && data.hash !== currentHash && data.episodes) {
          var changed = false;
          data.episodes.forEach(function(remoteEp) {
            var localEp = EPISODES.find(function(e) { return e.ordre === remoteEp.ordre; });
            if (localEp && localEp.vu !== remoteEp.vu) {
              localEp.vu = remoteEp.vu;
              changed = true;
            }
          });
          if (changed) {
            saveLocalState();
            render();
            setTimeout(function() {
              document.querySelectorAll('.row').forEach(function(row) {
                row.classList.add('synced-update');
                setTimeout(function() { row.classList.remove('synced-update'); }, 600);
              });
            }, 100);
            showToast('Mise à jour depuis un autre appareil');
            return true;
          }
        }
        return false;
      } catch(e) { return false; }
    }

    function syncWithServer() {
      setSyncStatus('syncing');
      
      var callback = function(data) {
        var remoteEpisodes = data || [];
        if (!remoteEpisodes.length) {
          setSyncStatus('error');
          return;
        }

        var changed = false;
        remoteEpisodes.forEach(function(remoteEp) {
          var localEp = EPISODES.find(function(e) { return e.ordre === remoteEp.ordre; });
          if (localEp && localEp.vu !== remoteEp.vu) {
            localEp.vu = remoteEp.vu;
            changed = true;
          }
        });

        if (changed) {
          saveLocalState();
          render();
          setTimeout(function() {
            document.querySelectorAll('.row').forEach(function(row) {
              row.classList.add('synced-update');
              setTimeout(function() { row.classList.remove('synced-update'); }, 600);
            });
          }, 100);
          showToast('Mise à jour depuis le serveur');
          setSyncStatus('ok');
        } else {
          setSyncStatus('ok');
        }
      };

      if (usingGAS) {
        google.script.run
          .withSuccessHandler(callback)
          .withFailureHandler(function() {
            setSyncStatus('error');
          })
          .getEpisodes();
      } else {
        jsonp(APPS_SCRIPT_URL + '?action=episodes', function(res) {
          if (res && res.ok) {
            callback(res.data);
          } else {
            setSyncStatus('error');
          }
        });
      }
    }

    function syncAll() {
      var localChanged = checkLocalSync();
      if (!localChanged) {
        syncWithServer();
      } else {
        syncWithServer();
      }
    }

    // ===== FIN SYSTÈME DE SYNCHRONISATION =====

    function jsonp(url, cb){
      var cbName = 'jsonp_cb_' + Math.random().toString(36).slice(2);
      var s = document.createElement('script');
      window[cbName] = function(data){ cb(data); delete window[cbName]; s.remove(); };
      s.src = url + (url.indexOf('?') > -1 ? '&' : '?') + 'callback=' + cbName;
      s.onerror = function(){ cb({ ok: false, error: 'Connexion impossible' }); delete window[cbName]; };
      document.body.appendChild(s);
    }

    function remoteGetEpisodes(cb){
      if (usingGAS){
        google.script.run.withSuccessHandler(cb).withFailureHandler(function(){ cb([]); }).getEpisodes();
      } else {
        jsonp(APPS_SCRIPT_URL + '?action=episodes', function(res){ cb(res && res.ok ? res.data : []); });
      }
    }

    var EPISODES = [];
    var statusFilter = 'tous';
    var universeFilter = 'tous';
    var genreFilter = 'tous';

    var PALETTE = [
      '#b23a2c', '#c9a227', '#5f7a4c', '#4c7a78',
      '#3f51b5', '#8e44ad', '#d35400', '#7f8c8d'
    ];

    var UNIVERSE_COLOR = {};
    var UNIVERSE_SHORT = {};

    function generateShortName(fullName, defaultSigle) {
      if (defaultSigle) return defaultSigle.toUpperCase();
      if (fullName.includes(':')) {
        var parts = fullName.split(':');
        var main = parts[0].replace('The Walking Dead', 'TWD').trim();
        var sub = parts[1].trim().toUpperCase();
        return main + ' — ' + sub;
      }
      return fullName.replace('The Walking Dead', 'TWD').toUpperCase();
    }

    function showToast(msg){
      var t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(function(){ t.classList.remove('show'); }, 2000);
    }

    function updateMeter(){
      var total = EPISODES.length;
      var vus = EPISODES.filter(function(e){ return e.vu; }).length;
      var pct = total ? Math.round((vus / total) * 100) : 0;
      document.getElementById('meterFill').style.width = pct + '%';
      document.getElementById('meterLabel').textContent = vus + ' / ' + total + ' · ' + pct + '%';
    }

    var ALL_UNIVERSES = [];

    function computeUniverseMeta(){
      var universeToSigle = {};
      ALL_UNIVERSES = [];
      EPISODES.forEach(function(e) {
        if(e.univers && !ALL_UNIVERSES.includes(e.univers)) {
          ALL_UNIVERSES.push(e.univers);
          universeToSigle[e.univers] = e.sigle || '';
        }
      });
      ALL_UNIVERSES.forEach(function(u, idx) {
        UNIVERSE_COLOR[u] = PALETTE[idx % PALETTE.length];
        UNIVERSE_SHORT[u] = generateShortName(u, universeToSigle[u]);
      });
    }

    function buildUniverseFilters(){
      var el = document.getElementById('universeFilters');
      var visibleUniverses = ALL_UNIVERSES.filter(function(u){
        return EPISODES.some(function(e){
          if (e.univers !== u) return false;
          if (genreFilter !== 'tous' && e.genre !== genreFilter) return false;
          if (statusFilter === 'voir' && e.vu) return false;
          if (statusFilter === 'vus' && !e.vu) return false;
          return true;
        });
      });

      if (universeFilter !== 'tous' && !visibleUniverses.includes(universeFilter)){
        universeFilter = 'tous';
      }

      el.innerHTML = visibleUniverses.map(function(u){
        var label = UNIVERSE_SHORT[u];
        var activeClass = (u === universeFilter) ? ' active' : '';
        var colorStyle = 'style="color:' + UNIVERSE_COLOR[u] + '"';
        return '<div class="filter-chip' + activeClass + '" data-univers="' + u + '" ' + colorStyle + '>' + label + '</div>';
      }).join('');

      el.querySelectorAll('.filter-chip').forEach(function(chip){
        chip.addEventListener('click', function(){
          el.querySelectorAll('.filter-chip').forEach(function(c){ c.classList.remove('active'); });
          chip.classList.add('active');
          universeFilter = chip.getAttribute('data-univers');
          render();
          updateResetVisibility();
          document.getElementById('sidebar').classList.remove('open');
        });
      });
    }

    function updateResetVisibility(){
      var anyActive = statusFilter !== 'tous' || genreFilter !== 'tous' || universeFilter !== 'tous';
      document.getElementById('resetFiltersBtn').style.display = anyActive ? 'flex' : 'none';
      document.getElementById('resetFiltersBtnMobile').classList.toggle('show', anyActive);
    }

    function resetAllFilters(){
      statusFilter = 'tous';
      genreFilter = 'tous';
      universeFilter = 'tous';
      document.querySelectorAll('.filter-chip[data-status], .filter-chip[data-genre], .filter-chip[data-univers]').forEach(function(c){ c.classList.remove('active'); });
      buildUniverseFilters();
      render();
      updateResetVisibility();
      document.getElementById('sidebar').classList.remove('open');
    }

    document.getElementById('resetFiltersBtn').addEventListener('click', resetAllFilters);
    document.getElementById('resetFiltersBtnMobile').addEventListener('click', resetAllFilters);

    document.getElementById('toggleFilterBtn').addEventListener('click', function(){
      document.getElementById('sidebar').classList.toggle('open');
    });

    document.querySelectorAll('[data-genre]').forEach(function(chip){
      chip.addEventListener('click', function(){
        var wasActive = chip.classList.contains('active');
        document.querySelectorAll('[data-genre]').forEach(function(c){ c.classList.remove('active'); });
        genreFilter = wasActive ? 'tous' : chip.getAttribute('data-genre');
        if (!wasActive) chip.classList.add('active');
        buildUniverseFilters();
        render();
        updateResetVisibility();
        document.getElementById('sidebar').classList.remove('open');
      });
    });

    document.querySelectorAll('[data-status]').forEach(function(chip){
      chip.addEventListener('click', function(){
        var wasActive = chip.classList.contains('active');
        document.querySelectorAll('[data-status]').forEach(function(c){ c.classList.remove('active'); });
        statusFilter = wasActive ? 'tous' : chip.getAttribute('data-status');
        if (!wasActive) chip.classList.add('active');
        buildUniverseFilters();
        render();
        updateResetVisibility();
        document.getElementById('sidebar').classList.remove('open');
      });
    });

    function matchesFilters(ep){
      if (universeFilter !== 'tous' && ep.univers !== universeFilter) return false;
      if (statusFilter === 'voir' && ep.vu) return false;
      if (statusFilter === 'vus' && !ep.vu) return false;
      if (genreFilter !== 'tous' && ep.genre !== genreFilter) return false;
      return true;
    }

    function searchUrlFor(ep){
      var q = ep.univers + ' ' + ep.code + ' مترجم';
      return 'https://www.google.com/search?q=' + encodeURIComponent(q);
    }

    function render(){
      var app = document.getElementById('app');
      var visible = EPISODES.filter(matchesFilters);
      var previousContainer = document.querySelector('.list');
      var savedScrollTop = previousContainer ? previousContainer.scrollTop : 0;

      if (visible.length === 0){
        app.innerHTML = '<div class="empty">Aucun épisode ne correspond à vos filtres.</div>';
        updateMeter();
        document.getElementById('firstUnseenBtn').style.display = 'none';
        return;
      }

      var html = '<div class="list">';
      visible.forEach(function(ep){
        var color = UNIVERSE_COLOR[ep.univers] || 'var(--slate)';
        var sigleText = ep.sigle || UNIVERSE_SHORT[ep.univers] || ep.univers;
        var isVu = !!ep.vu;

        var searchBtn = '<button class="row-btn row-search-btn' + (isVu ? ' hidden-search' : '') + '" data-search-ordre="' + ep.ordre + '" title="Rechercher">' +
                          '<i class="bi bi-search"></i>' +
                        '</button>';

        var vuBtn = '<button class="row-btn row-vu-btn' + (isVu ? ' vu' : '') + '" data-vu-ordre="' + ep.ordre + '" title="Marquer vu/non vu">' +
                      (isVu ? '<i class="bi bi-check-lg"></i>' : '<i class="bi bi-eye"></i>') +
                    '</button>';

        var pcDisplay = '<div class="row-code-wrapper">' +
                          '<span class="row-fullname">' + ep.univers + ' · <span>' + ep.code + '</span></span>' +
                        '</div>';

        var mobileDisplay = '<div class="row-mobile-wrapper">' +
                              '<span class="row-code">' + sigleText + ' ' + ep.code + '</span>' +
                            '</div>';

        html += '<div class="row' + (isVu ? ' vu' : '') + '" data-ordre="' + ep.ordre + '">' +
                  '<div class="row-serie" style="color:' + color + '">' + sigleText + '</div>' +
                  pcDisplay +
                  mobileDisplay +
                  searchBtn +
                  vuBtn +
                '</div>';
      });
      html += '</div>';
      app.innerHTML = html;

      if (!document.getElementById('search-btn-hidden-style')) {
        var style = document.createElement('style');
        style.id = 'search-btn-hidden-style';
        style.textContent = `.row-btn.hidden-search { visibility: hidden; pointer-events: none; }`;
        document.head.appendChild(style);
      }

      app.querySelectorAll('[data-search-ordre]').forEach(function(btn){
        btn.addEventListener('click', function(e){
          e.stopPropagation();
          var ep = EPISODES.find(function(e2){ return e2.ordre === Number(btn.getAttribute('data-search-ordre')); });
          if (ep) window.open(searchUrlFor(ep), '_blank');
        });
      });

      app.querySelectorAll('[data-vu-ordre]').forEach(function(btn){
        btn.addEventListener('click', function(e){
          e.stopPropagation();
          toggleEpisode(Number(btn.getAttribute('data-vu-ordre')));
        });
      });

      var newContainer = document.querySelector('.list');
      if (newContainer) { newContainer.scrollTop = savedScrollTop; }
      updateMeter();

      var firstUnseenBtn = document.getElementById('firstUnseenBtn');
      var firstUnseenLabel = document.getElementById('firstUnseenLabel');
      var firstUnseen = EPISODES.filter(function(e) { return !e.vu; }).sort(function(a,b){ return a.ordre - b.ordre; })[0];

      if (firstUnseen) {
        firstUnseenBtn.style.display = 'inline-flex';
        var sigle = firstUnseen.sigle || UNIVERSE_SHORT[firstUnseen.univers] || firstUnseen.univers;
        firstUnseenLabel.textContent = sigle + ' ' + firstUnseen.code;
      } else {
        firstUnseenBtn.style.display = 'none';
      }

      saveLocalState();
    }

    function toggleEpisode(ordre){
      var ep = EPISODES.find(function(e){ return e.ordre === ordre; });
      if (!ep) return;
      var next = !ep.vu;
      ep.vu = next;

      render();
      saveLocalState();

      if (usingGAS){
        google.script.run.withSuccessHandler(function(res){
          if (!res || !res.ok){ ep.vu = !next; render(); showToast('Erreur serveur'); }
          else { saveLocalState(); }
        }).withFailureHandler(function(){ ep.vu = !next; render(); showToast('Erreur connexion'); }).setVu(ordre, next);
      } else {
        jsonp(APPS_SCRIPT_URL + '?action=setVu&ordre=' + ordre + '&vu=' + next, function(res){
          if (!res || !res.ok){ ep.vu = !next; render(); showToast('Erreur'); }
          else { saveLocalState(); }
        });
      }
    }

    function findCurrentOrdre(){
      if (!EPISODES.length) return null;
      var lastWatched = 0;
      EPISODES.forEach(function(e){ if (e.vu && e.ordre > lastWatched) lastWatched = e.ordre; });
      if (lastWatched === 0) return EPISODES[0].ordre;
      var next = EPISODES.find(function(e){ return e.ordre === lastWatched + 1; });
      return next ? next.ordre : lastWatched;
    }

    function scrollToCurrent(){
      var ordre = findCurrentOrdre();
      if (ordre == null) return;
      var container = document.querySelector('.list');
      var row = container ? container.querySelector('.row[data-ordre="' + ordre + '"]') : null;

      if (!row){
        statusFilter = 'tous'; universeFilter = 'tous'; genreFilter = 'tous';
        document.querySelectorAll('.filter-chip').forEach(function(c){ c.classList.remove('active'); });
        updateResetVisibility();
        render();
        container = document.querySelector('.list');
        row = container ? container.querySelector('.row[data-ordre="' + ordre + '"]') : null;
      }
      if (!row || !container) return;

      var rowOffsetTop = row.offsetTop;
      var containerHeight = container.clientHeight;
      var rowHeight = row.clientHeight;
      container.scrollTop = rowOffsetTop - (containerHeight / 2) + (rowHeight / 2);

      row.classList.add('current');
      setTimeout(function(){ row.classList.remove('current'); }, 3600);
    }

    function scrollToFirstUnseen(){
      var firstUnseen = EPISODES.filter(function(e) { return !e.vu; }).sort(function(a,b){ return a.ordre - b.ordre; })[0];
      if (!firstUnseen) {
        showToast('Tous les épisodes sont vus !');
        return;
      }
      var ordre = firstUnseen.ordre;
      statusFilter = 'tous'; universeFilter = 'tous'; genreFilter = 'tous';
      document.querySelectorAll('.filter-chip').forEach(function(c){ c.classList.remove('active'); });
      updateResetVisibility();
      render();

      var container = document.querySelector('.list');
      var row = container ? container.querySelector('.row[data-ordre="' + ordre + '"]') : null;
      if (!row || !container) {
        showToast('Épisode introuvable');
        return;
      }
      var rowOffsetTop = row.offsetTop;
      var containerHeight = container.clientHeight;
      var rowHeight = row.clientHeight;
      container.scrollTop = rowOffsetTop - (containerHeight / 2) + (rowHeight / 2);

      row.classList.add('current');
      setTimeout(function(){ row.classList.remove('current'); }, 3600);
    }

    document.getElementById('continueBtn').addEventListener('click', scrollToCurrent);
    document.getElementById('firstUnseenBtn').addEventListener('click', scrollToFirstUnseen);

    remoteGetEpisodes(function(data){
      EPISODES = data || [];
      computeUniverseMeta();
      buildUniverseFilters();
      render();
      saveLocalState();
      setTimeout(scrollToCurrent, 350);

      setSyncStatus('ok');

      setTimeout(function() {
        syncAll();
      }, 2000);

      setInterval(function() {
        syncAll();
      }, SYNC_INTERVAL);

      window.addEventListener('storage', function(e) {
        if (e.key === SYNC_KEY || e.key === LAST_UPDATE_KEY) {
          checkLocalSync();
        }
      });
    });
  </script>

        console.log('App installée');
      }
      deferredPrompt = null;
      installBtn.remove();
    }
  });
});
